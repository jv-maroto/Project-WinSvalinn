<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WinSvalinn</title>
    <style>
      /* Instant themed boot splash, painted before the JS bundle loads so the
         window never flashes an ugly black/blank frame on launch. React
         replaces #root's contents on mount, which removes the splash. */
      html, body { height: 100%; margin: 0; background: #05070c; }
      #boot {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        background:
          radial-gradient(60% 50% at 15% -5%, rgba(34, 211, 238, 0.10), transparent 70%),
          radial-gradient(50% 50% at 105% 108%, rgba(139, 92, 246, 0.12), transparent 72%),
          #05070c;
        font-family: system-ui, "Segoe UI", sans-serif; color: #e6ecf5;
      }
      #boot img {
        width: 96px; height: 96px; border-radius: 22px;
        filter: drop-shadow(0 10px 34px rgba(34, 211, 238, 0.35));
        animation: bpulse 2.4s ease-in-out infinite;
      }
      #boot .bname { font-size: 22px; font-weight: 650; letter-spacing: 0.5px; }
      #boot .bsub { font-size: 13px; color: #8b97ad; margin-top: -6px; }
      #boot .bspin {
        width: 26px; height: 26px; border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.12); border-top-color: #22d3ee;
        animation: bspin 0.8s linear infinite;
      }
      @keyframes bspin { to { transform: rotate(360deg); } }
      @keyframes bpulse { 0%, 100% { opacity: 0.85; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
    </style>
  </head>
  <body class="bg-bg text-text antialiased">
    <div id="root">
      <div id="boot" aria-hidden="true">
        <img src="/logo.png" alt="" />
        <div class="bname">WinSvalinn</div>
        <div class="bsub">Iniciando…</div>
        <div class="bspin"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
