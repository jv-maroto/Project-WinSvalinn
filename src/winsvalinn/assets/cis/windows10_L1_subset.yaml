profile: "CIS Microsoft Windows 10 — L1 (subset)"
version: "1.0-winsvalinn"
controls:
  - id: "1.1.1"
    name: "Enforce password history >= 24"
    category: "Password Policy"
    type: "powershell"
    expression: "(net accounts | Select-String 'history') -replace '[^0-9]',''"
    expected: 24
    operator: ">="
    severity: "high"
    rationale: "Prevent password reuse"
    remediation: "secpol.msc -> Account Policies -> Password Policy -> Enforce password history = 24"

  - id: "1.1.2"
    name: "Maximum password age <= 365"
    category: "Password Policy"
    type: "powershell"
    expression: "(net accounts | Select-String 'Maximum password age') -replace '[^0-9]',''"
    expected: 365
    operator: "<="
    severity: "medium"
    rationale: "Force periodic password change"
    remediation: "secpol.msc -> Account Policies -> Maximum password age <= 365"

  - id: "2.3.1"
    name: "Disable Guest account"
    category: "Local Accounts"
    type: "powershell"
    expression: "if ((Get-LocalUser -Name 'Guest' -ErrorAction SilentlyContinue).Enabled) { 'enabled' } else { 'disabled' }"
    expected: "disabled"
    operator: "="
    severity: "high"
    rationale: "Guest accounts are an attack vector"
    remediation: "lusrmgr.msc -> Users -> Guest -> Properties -> Account is disabled"

  - id: "2.3.2"
    name: "Limit local account use of blank passwords"
    category: "Local Policies"
    type: "registry"
    hive: "HKLM"
    path: "SYSTEM\\CurrentControlSet\\Control\\Lsa"
    value_name: "LimitBlankPasswordUse"
    expected: 1
    operator: "="
    severity: "high"
    rationale: "Prevent network logon with blank password"
    remediation: "secpol.msc -> Limit local account use of blank passwords to console logon only -> Enabled"

  - id: "5.1"
    name: "Telemetry service (DiagTrack) disabled"
    category: "Privacy"
    type: "service_state"
    name_field: "DiagTrack"
    expected: "DISABLED"
    operator: "="
    severity: "medium"
    rationale: "Reduce data collection"
    remediation: "services.msc -> Connected User Experiences and Telemetry -> Disabled"

  - id: "5.2"
    name: "Remote Registry service disabled"
    category: "Network"
    type: "service_state"
    name_field: "RemoteRegistry"
    expected: "DISABLED"
    operator: "="
    severity: "high"
    rationale: "Remote Registry is a known attack vector"
    remediation: "services.msc -> Remote Registry -> Disabled"

  - id: "9.1.1"
    name: "Windows Defender Real-Time Protection enabled"
    category: "Antivirus"
    type: "powershell"
    expression: "(Get-MpComputerStatus).RealTimeProtectionEnabled"
    expected: "True"
    operator: "="
    severity: "critical"
    rationale: "Real-time AV protection"
    remediation: "Habilitar protección en tiempo real en Windows Security"

  - id: "9.2.1"
    name: "Windows Firewall: Domain profile enabled"
    category: "Firewall"
    type: "powershell"
    expression: "(Get-NetFirewallProfile -Name Domain).Enabled"
    expected: "True"
    operator: "="
    severity: "high"
    rationale: "Firewall must be enabled on every profile"
    remediation: "Set-NetFirewallProfile -Name Domain -Enabled True"

  - id: "9.2.2"
    name: "Windows Firewall: Private profile enabled"
    category: "Firewall"
    type: "powershell"
    expression: "(Get-NetFirewallProfile -Name Private).Enabled"
    expected: "True"
    operator: "="
    severity: "high"
    rationale: "Firewall must be enabled on every profile"
    remediation: "Set-NetFirewallProfile -Name Private -Enabled True"

  - id: "9.2.3"
    name: "Windows Firewall: Public profile enabled"
    category: "Firewall"
    type: "powershell"
    expression: "(Get-NetFirewallProfile -Name Public).Enabled"
    expected: "True"
    operator: "="
    severity: "critical"
    rationale: "Firewall must be enabled on every profile"
    remediation: "Set-NetFirewallProfile -Name Public -Enabled True"

  - id: "18.1.1"
    name: "SMBv1 client disabled"
    category: "SMB"
    type: "powershell"
    expression: "(Get-WindowsOptionalFeature -Online -FeatureName SMB1Protocol).State"
    expected: "Disabled"
    operator: "="
    severity: "critical"
    rationale: "SMBv1 = WannaCry/EternalBlue vector"
    remediation: "Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol"

  - id: "18.2.1"
    name: "AutoRun (NoDriveTypeAutoRun) disabled for all drives"
    category: "Removable Media"
    type: "registry"
    hive: "HKLM"
    path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer"
    value_name: "NoDriveTypeAutoRun"
    expected: 255
    operator: "="
    severity: "medium"
    rationale: "Prevent malware from autorun"
    remediation: "gpedit.msc -> Computer Config -> Admin Templates -> Windows Components -> AutoPlay Policies -> Turn off AutoPlay -> Enabled"

  - id: "18.3.1"
    name: "RDP disabled"
    category: "Remote Access"
    type: "registry"
    hive: "HKLM"
    path: "SYSTEM\\CurrentControlSet\\Control\\Terminal Server"
    value_name: "fDenyTSConnections"
    expected: 1
    operator: "="
    severity: "high"
    rationale: "RDP is a common entry point if exposed"
    remediation: "System Properties -> Remote -> Don't allow remote connections"

  - id: "18.4.1"
    name: "UAC enabled (EnableLUA=1)"
    category: "UAC"
    type: "registry"
    hive: "HKLM"
    path: "SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
    value_name: "EnableLUA"
    expected: 1
    operator: "="
    severity: "critical"
    rationale: "UAC is a baseline mitigation"
    remediation: "secpol.msc -> Local Policies -> Security Options -> User Account Control: Run all administrators in Admin Approval Mode -> Enabled"

  - id: "18.5.1"
    name: "Windows Update auto-update enabled"
    category: "Updates"
    type: "registry"
    hive: "HKLM"
    path: "SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU"
    value_name: "NoAutoUpdate"
    expected: 0
    operator: "="
    severity: "medium"
    rationale: "Patches must be applied"
    remediation: "Re-enable Windows Update auto-install"
