name: Sign release (Azure Trusted Signing)

# Opt-in code-signing for a published release using Azure Trusted Signing.
# Run it manually (Actions → "Sign release" → Run workflow → enter the tag) once
# you've set the repository secrets below. It downloads the release's installers,
# signs them, and re-uploads the signed versions over the originals.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET  (a service principal
#       with the "Trusted Signing Certificate Profile Signer" role)
#   AZURE_TS_ENDPOINT   e.g. https://weu.codesigning.azure.net
#   AZURE_TS_ACCOUNT    your Trusted Signing account name
#   AZURE_TS_PROFILE    your certificate profile name
# See docs/SIGNING.md for the full setup.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sign (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  sign:
    runs-on: windows-latest
    steps:
      - name: Check signing is configured
        shell: bash
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ -z "$CLIENT_ID" ]; then
            echo "::error::Azure Trusted Signing secrets are not set. Add AZURE_TENANT_ID, \
            AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TS_ENDPOINT, AZURE_TS_ACCOUNT and \
            AZURE_TS_PROFILE (see docs/SIGNING.md)."
            exit 1
          fi

      - name: Download release installers
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ inputs.tag }}" -R "${{ github.repository }}" \
            -p "*.exe" -p "*.msi" -D dist

      - name: Sign with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TS_PROFILE }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: exe,msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-upload signed installers
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag }}" dist/*.exe dist/*.msi \
            -R "${{ github.repository }}" --clobber
